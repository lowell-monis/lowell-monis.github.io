about: |
  I am a data scientist and engineer trained at Michigan State University with a passion for
  leveraging statistical learning to address complex public policy and public health challenges.
  My experience ranges from engineering ETL pipelines for Medicaid claims at Delta Dental
  to developing Bayesian hierarchical models in epidemiology. I have a proven track record of
  building end-to-end machine learning solutions leveraging Python and R while maintaining
  clean systems for package management and data extraction via Git, SQL, and NoSQL tools,
  and I am particularly seeking roles where I can apply my background in data engineering
  and predictive modeling to drive actionable business insights and social impact.

  I am currently a Researcher with the [JimLab led by Dr. Jim Anthony](https://epibio.msu.edu/research/jimlab/index.html) at the
  Department of Epidemiology and Biostatistics at the MSU College of Human Medicine. I will be starting an internship with the
  Passive Safety Team in the Fremont Crash Lab at Tesla, Inc. in May 2026.

what_i_bring_intro: >
  I build end-to-end data solutions, from engineering reliable pipelines to communicating
  findings that drive decisions. My work spans statistical modeling, machine learning, and
  policy analysis, and I bring deep fluency across the full data lifecycle. I am an ardent
  believer in communicable data science: storytelling is the most important part of the
  lifecycle (even the actual model), and I am committed to making my work accessible and 
  actionable for all audiences.

